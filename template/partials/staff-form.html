<style>nav,#basket,#basket-badge{display:none!important}#waiter-status{display:block;text-align:left;color:#2e7d32;font-size:1.2rem;margin-top:.5rem}#staff-menu-link{display:block;margin-top:.75rem;color:var(--c-primary);font-weight:600;text-decoration:underline;text-underline-offset:.2rem}</style><article><section id="staff-form"><h2>{{waiterLabel}}</h2><input type="text" id="waiter-input" placeholder="{{waiterLabel}}" autocomplete="off"><button id="waiter-save">{{saveLabel}}</button><p id="waiter-status"></p><a id="staff-menu-link" href="/menu.html">→ Menu</a></section><script>(function(){var inp=document.getElementById('waiter-input');var btn=document.getElementById('waiter-save');var sts=document.getElementById('waiter-status');inp.value=localStorage.getItem('waiter')||'';btn.addEventListener('click',function(){var v=inp.value.trim();if(!v)return;localStorage.setItem('waiter',v);sts.textContent='✓';});})()</script></article>
